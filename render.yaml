services:
  - type: web
    name: sagadrop-backend
    runtime: python
    repo: https://github.com/luccy93/SagaDrop
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DB_NAME
        value: sagadrop
      - key: CORS_ORIGINS
        value: https://saga-drop-gules.vercel.app,https://saga-drop-git-main-luccy93s-projects.vercel.app,http://localhost:3000
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: SagaDrop <noreply@sagadrop.com>
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@sagadrop.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
